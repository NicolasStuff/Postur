# fly.toml - Configuration Fly.io pour Postur
# Voir https://fly.io/docs/reference/configuration/ pour la documentation

app = "postur"
primary_region = "cdg" # Paris - Changez selon votre région préférée

# Build configuration
[build]
  [build.args]
    NEXT_PUBLIC_APP_URL = "https://postur.fr"
    NEXT_PUBLIC_GTM_ID = "GTM-KD78VTHP"
    NEXT_PUBLIC_AXEPTIO_CLIENT_ID = "69c2b40fad08adace6110d57"
    NEXT_PUBLIC_AXEPTIO_COOKIES_VERSION = "352d6c5e-0d71-411f-a3d1-53df20c78d7d"
    NEXT_PUBLIC_AXEPTIO_GOOGLE_ANALYTICS_VENDOR = "google_analytics_4"
    NEXT_PUBLIC_AXEPTIO_GOOGLE_ADS_VENDOR = "google_ads"

# Configuration HTTP service
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # Health check
  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

# Configuration des machines virtuelles
[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

# Variables d'environnement (ne pas inclure les secrets ici)
[env]
  NODE_ENV = "production"
  PORT = "3000"
  NEXT_TELEMETRY_DISABLED = "1"

# Configuration pour déploiement
[deploy]
  release_command = "npx prisma migrate deploy"
  strategy = "rolling"

# Métriques
[[metrics]]
  port = 9091
  path = "/metrics"
