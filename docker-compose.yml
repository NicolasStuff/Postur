version: '3.9'

services:
  # Base de données PostgreSQL pour le développement local
  postgres:
    image: postgres:16-alpine
    container_name: theraflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: theraflow
      POSTGRES_PASSWORD: theraflow_dev_password
      POSTGRES_DB: theraflow_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U theraflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application Next.js
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: theraflow-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://theraflow:theraflow_dev_password@postgres:5432/theraflow_dev
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Pour le développement en mode hot-reload (optionnel)
      # - ./src:/app/src
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
